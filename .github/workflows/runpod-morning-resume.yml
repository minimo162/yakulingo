name: runpod-morning-resume

on:
  schedule:
    - cron: "50 23 * * 0-4" # Sun-Thu 23:50 UTC = Mon-Fri 08:50 JST
  workflow_dispatch:

permissions:
  contents: read

jobs:
  resume-pod:
    runs-on: ubuntu-latest
    steps:
      - name: Resume RunPod Pod
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_POD_ID: ${{ secrets.RUNPOD_POD_ID }}
          RUNPOD_POD_NAME: ${{ secrets.RUNPOD_POD_NAME }}
          RUNPOD_TEMPLATE_ID: ${{ secrets.RUNPOD_TEMPLATE_ID }}
          RUNPOD_IMAGE_NAME: ${{ secrets.RUNPOD_IMAGE_NAME }}
          RUNPOD_GPU_TYPE_ID: ${{ secrets.RUNPOD_GPU_TYPE_ID }}
          RUNPOD_GPU_COUNT: ${{ secrets.RUNPOD_GPU_COUNT }}
          RUNPOD_CONTAINER_DISK_GB: ${{ secrets.RUNPOD_CONTAINER_DISK_GB }}
          RUNPOD_PORTS: ${{ secrets.RUNPOD_PORTS }}
          RUNPOD_VOLUME_MOUNT_PATH: ${{ secrets.RUNPOD_VOLUME_MOUNT_PATH }}
          RUNPOD_NETWORK_VOLUME_ID: ${{ secrets.RUNPOD_NETWORK_VOLUME_ID }}
          RUNPOD_CLOUD_TYPE: ${{ secrets.RUNPOD_CLOUD_TYPE }}
          RUNPOD_DATA_CENTER_ID: ${{ secrets.RUNPOD_DATA_CENTER_ID }}
          RUNPOD_PROXY_CHECK_ENABLED: ${{ secrets.RUNPOD_PROXY_CHECK_ENABLED }}
          RUNPOD_DOCKER_START_CMD_JSON: ${{ secrets.RUNPOD_DOCKER_START_CMD_JSON }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          if [ -z "${RUNPOD_API_KEY:-}" ]; then
            echo "[ERROR] RUNPOD_API_KEY is not set"
            exit 1
          fi

          RUNPOD_CLOUD_TYPE=${RUNPOD_CLOUD_TYPE:-SECURE}
          RUNPOD_GPU_COUNT=${RUNPOD_GPU_COUNT:-1}
          RUNPOD_CONTAINER_DISK_GB=${RUNPOD_CONTAINER_DISK_GB:-30}
          RUNPOD_PORTS=${RUNPOD_PORTS:-11434/http}
          RUNPOD_VOLUME_MOUNT_PATH=${RUNPOD_VOLUME_MOUNT_PATH:-/workspace}
          RUNPOD_TEMPLATE_ID=${RUNPOD_TEMPLATE_ID:-}
          RUNPOD_IMAGE_NAME=${RUNPOD_IMAGE_NAME:-}
          RUNPOD_PROXY_CHECK_ENABLED=${RUNPOD_PROXY_CHECK_ENABLED:-1}
          RUNPOD_DOCKER_START_CMD_JSON=${RUNPOD_DOCKER_START_CMD_JSON:-}

          if [ -z "${RUNPOD_DOCKER_START_CMD_JSON}" ]; then
            DEFAULT_BOOTSTRAP_CMD=$(cat <<'SCRIPT_EOF'
set -euo pipefail
LOG_DIR="/workspace/logs"
LOG_FILE="${LOG_DIR}/auto-bootstrap.log"
REPO_DIR="/workspace/_yakulingo_bootstrap"
mkdir -p "${LOG_DIR}" /workspace/scripts
echo "[auto-bootstrap] start $(date -Is)" >> "${LOG_FILE}"

if [ ! -x /workspace/scripts/runpod_nv_bootstrap.sh ] || [ ! -x /workspace/scripts/runpod_lobehub_bootstrap.sh ]; then
  if ! command -v git >/dev/null 2>&1; then
    export DEBIAN_FRONTEND=noninteractive
    apt-get update >> "${LOG_FILE}" 2>&1
    apt-get install -y git >> "${LOG_FILE}" 2>&1
  fi

  if [ ! -d "${REPO_DIR}/.git" ]; then
    rm -rf "${REPO_DIR}"
    git clone --depth 1 --branch main https://github.com/minimo162/yakulingo.git "${REPO_DIR}" >> "${LOG_FILE}" 2>&1
  else
    git -C "${REPO_DIR}" fetch origin main --depth 1 >> "${LOG_FILE}" 2>&1 || true
    if ! git -C "${REPO_DIR}" checkout main >> "${LOG_FILE}" 2>&1 || ! git -C "${REPO_DIR}" pull --ff-only origin main >> "${LOG_FILE}" 2>&1; then
      rm -rf "${REPO_DIR}"
      git clone --depth 1 --branch main https://github.com/minimo162/yakulingo.git "${REPO_DIR}" >> "${LOG_FILE}" 2>&1
    fi
  fi

  cp "${REPO_DIR}/tools/runpod_eval/runpod_nv_bootstrap.sh" /workspace/scripts/runpod_nv_bootstrap.sh
  cp "${REPO_DIR}/tools/runpod_eval/runpod_lobehub_bootstrap.sh" /workspace/scripts/runpod_lobehub_bootstrap.sh
  chmod +x /workspace/scripts/runpod_nv_bootstrap.sh /workspace/scripts/runpod_lobehub_bootstrap.sh
fi

FAST_START=1 bash /workspace/scripts/runpod_nv_bootstrap.sh >> "${LOG_FILE}" 2>&1
FAST_START=1 bash /workspace/scripts/runpod_lobehub_bootstrap.sh >> "${LOG_FILE}" 2>&1

echo "[auto-bootstrap] done $(date -Is)" >> "${LOG_FILE}"
exec tail -f /dev/null
SCRIPT_EOF
)
            RUNPOD_DOCKER_START_CMD_JSON=$(jq -cn --arg cmd "$DEFAULT_BOOTSTRAP_CMD" '["bash","-lc",$cmd]')
          fi

          if ! echo "${RUNPOD_DOCKER_START_CMD_JSON}" | jq -e 'type == "array" and all(.[]; type == "string")' >/dev/null 2>&1; then
            echo "[ERROR] RUNPOD_DOCKER_START_CMD_JSON must be a JSON string array"
            exit 1
          fi

          resolve_pod_by_name() {
            local pod_name="$1"
            local query_payload list_resp err_count matched_count
            query_payload='{"query":"query { myself { pods { id name desiredStatus networkVolumeId } } }"}'
            list_resp=$(curl -sS https://api.runpod.io/graphql \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
              -d "$query_payload")
            err_count=$(echo "$list_resp" | jq -r '.errors | length // 0')
            if [ "$err_count" != "0" ]; then
              echo "[ERROR] pod list query failed: $(echo "$list_resp" | jq -c '.')"
              return 1
            fi
            matched_count=$(echo "$list_resp" | jq -r --arg name "$pod_name" '[.data.myself.pods[]? | select(.name == $name)] | length')
            if [ "$matched_count" = "0" ]; then
              return 0
            fi
            if [ "$matched_count" != "1" ]; then
              echo "[ERROR] multiple pods found by RUNPOD_POD_NAME=${pod_name}; set unique name"
              echo "$list_resp" | jq -r --arg name "$pod_name" '.data.myself.pods[]? | select(.name == $name) | "\(.id) \(.name) \(.desiredStatus // "")"'
              return 1
            fi
            echo "$list_resp" | jq -r --arg name "$pod_name" '.data.myself.pods[]? | select(.name == $name) | @json'
          }

          query_pod_by_id() {
            local pod_id="$1"
            local payload resp err_count
            payload=$(jq -cn --arg id "$pod_id" \
              '{"query":"query($id:String!){ pod(input:{podId:$id}) { id name desiredStatus networkVolumeId } }","variables":{"id":$id}}')
            resp=$(curl -sS https://api.runpod.io/graphql \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
              -d "$payload")
            err_count=$(echo "$resp" | jq -r '.errors | length // 0')
            if [ "$err_count" != "0" ]; then
              echo "[ERROR] pod query failed: $(echo "$resp" | jq -c '.')"
              return 1
            fi
            echo "$resp"
          }

          terminate_pod() {
            local pod_id="$1"
            local term_payload term_resp term_err
            term_payload=$(jq -cn --arg id "$pod_id" \
              '{"query":"mutation($input: PodTerminateInput!){ podTerminate(input:$input) }","variables":{"input":{"podId":$id}}}')
            term_resp=$(curl -sS https://api.runpod.io/graphql \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
              -d "$term_payload")
            term_err=$(echo "$term_resp" | jq -r '.errors | length // 0')
            if [ "$term_err" != "0" ]; then
              echo "[ERROR] podTerminate failed: $(echo "$term_resp" | jq -c '.')"
              return 1
            fi
            return 0
          }

          parse_proxy_port() {
            local ports="${1:-}"
            echo "$ports" | tr ',' '\n' | head -n1 | sed -E 's#^\s*([0-9]+).*$#\1#'
          }

          check_proxy_warning() {
            local pod_id="$1"
            local proxy_port="$2"
            local attempts=10
            local wait_sec=15
            local url body_file http_code
            url="https://${pod_id}-${proxy_port}.proxy.runpod.net/"
            body_file="/tmp/runpod_proxy_check_${pod_id}.txt"

            echo "[INFO] proxy warning check url=${url}"
            for attempt in $(seq 1 "$attempts"); do
              http_code=$(curl -sS -L --max-time 20 -o "$body_file" -w '%{http_code}' "$url" || echo "000")
              if grep -qi "critical error on this machine" "$body_file" 2>/dev/null; then
                echo "[ERROR] critical machine warning detected from proxy response"
                return 2
              fi
              case "$http_code" in
                200|401|403|404)
                  echo "[INFO] proxy check passed: http=${http_code} try=${attempt}/${attempts}"
                  return 0
                  ;;
              esac
              echo "[INFO] proxy check pending: http=${http_code} try=${attempt}/${attempts}"
              if [ "$attempt" -lt "$attempts" ]; then
                sleep "$wait_sec"
              fi
            done
            echo "[WARN] proxy check timed out without clear warning"
            return 1
          }

          TARGET_POD_ID=""
          TARGET_STATUS=""
          TARGET_NETWORK_VOLUME_ID=""
          ACTIVE_POD_ID=""
          if [ -n "${RUNPOD_POD_NAME:-}" ]; then
            POD_JSON=$(resolve_pod_by_name "$RUNPOD_POD_NAME")
            if [ -n "$POD_JSON" ]; then
              TARGET_POD_ID=$(echo "$POD_JSON" | jq -r '.id')
              TARGET_STATUS=$(echo "$POD_JSON" | jq -r '.desiredStatus // empty')
              TARGET_NETWORK_VOLUME_ID=$(echo "$POD_JSON" | jq -r '.networkVolumeId // empty')
            fi
          elif [ -n "${RUNPOD_POD_ID:-}" ]; then
            TARGET_POD_ID="${RUNPOD_POD_ID}"
            POD_QUERY_RESP=$(query_pod_by_id "$TARGET_POD_ID")
            TARGET_STATUS=$(echo "$POD_QUERY_RESP" | jq -r '.data.pod.desiredStatus // empty')
            TARGET_NETWORK_VOLUME_ID=$(echo "$POD_QUERY_RESP" | jq -r '.data.pod.networkVolumeId // empty')
          else
            echo "[ERROR] RUNPOD_POD_NAME or RUNPOD_POD_ID is not set"
            exit 1
          fi

          if [ -n "$TARGET_POD_ID" ]; then
            echo "target_pod_id=${TARGET_POD_ID} desiredStatus=${TARGET_STATUS} networkVolumeId=${TARGET_NETWORK_VOLUME_ID:-<none>}"
          else
            echo "[INFO] target pod was not found. creating a new pod..."
          fi

          if [ -n "$TARGET_POD_ID" ] && [ -n "${RUNPOD_NETWORK_VOLUME_ID:-}" ] && [ "${TARGET_NETWORK_VOLUME_ID:-}" != "${RUNPOD_NETWORK_VOLUME_ID}" ]; then
            echo "[WARN] existing pod networkVolumeId mismatch: expected=${RUNPOD_NETWORK_VOLUME_ID} actual=${TARGET_NETWORK_VOLUME_ID:-<none>}. terminate and recreate."
            if ! terminate_pod "$TARGET_POD_ID"; then
              exit 1
            fi
            TARGET_POD_ID=""
            TARGET_STATUS=""
            TARGET_NETWORK_VOLUME_ID=""
          fi

          ACTION_SUMMARY=""

          if [ -n "$TARGET_POD_ID" ] && [ "${TARGET_STATUS:-}" = "RUNNING" ]; then
            ACTION_SUMMARY="pod already running: id=${TARGET_POD_ID}"
            ACTIVE_POD_ID="$TARGET_POD_ID"
          elif [ -n "$TARGET_POD_ID" ]; then
            RESUME_PAYLOAD=$(jq -cn --arg id "$TARGET_POD_ID" --argjson gc "$RUNPOD_GPU_COUNT" \
              '{"query":"mutation($input: PodResumeInput!){ podResume(input:$input){ id desiredStatus } }","variables":{"input":{"podId":$id,"gpuCount":$gc}}}')
            RESUME_RESP=$(curl -sS https://api.runpod.io/graphql \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
              -d "$RESUME_PAYLOAD")

            echo "$RESUME_RESP"
            RESUME_ERR=$(echo "$RESUME_RESP" | jq -r '.errors | length // 0')
            RESUME_ID=$(echo "$RESUME_RESP" | jq -r '.data.podResume.id // empty')
            RESUME_STATUS=$(echo "$RESUME_RESP" | jq -r '.data.podResume.desiredStatus // empty')

            if [ "$RESUME_ERR" = "0" ] && [ -n "$RESUME_ID" ]; then
              ACTION_SUMMARY="podResume succeeded: id=${RESUME_ID} status=${RESUME_STATUS}"
              ACTIVE_POD_ID="$RESUME_ID"
            elif [ -n "$TARGET_NETWORK_VOLUME_ID" ]; then
              echo "[WARN] podResume failed on network-volume pod. fallback to terminate + redeploy."
              if ! terminate_pod "$TARGET_POD_ID"; then
                exit 1
              fi
              TARGET_POD_ID=""
            else
              echo "[ERROR] podResume failed: $(echo "$RESUME_RESP" | jq -c '.')"
              exit 1
            fi
          fi

          if [ -z "$TARGET_POD_ID" ] && [ -z "$ACTION_SUMMARY" ]; then
            if [ -z "${RUNPOD_POD_NAME:-}" ]; then
              echo "[ERROR] RUNPOD_POD_NAME is required when creating a new pod"
              exit 1
            fi
            if [ -z "${RUNPOD_GPU_TYPE_ID:-}" ]; then
              echo "[ERROR] RUNPOD_GPU_TYPE_ID is required for pod creation"
              exit 1
            fi
            if [ -z "${RUNPOD_TEMPLATE_ID:-}" ] && [ -z "${RUNPOD_IMAGE_NAME:-}" ]; then
              echo "[ERROR] RUNPOD_TEMPLATE_ID or RUNPOD_IMAGE_NAME is required for pod creation"
              exit 1
            fi

            echo "[INFO] create config: cloud=${RUNPOD_CLOUD_TYPE} pod_name=${RUNPOD_POD_NAME} gpu_type_id=${RUNPOD_GPU_TYPE_ID} gpu_count=${RUNPOD_GPU_COUNT} disk=${RUNPOD_CONTAINER_DISK_GB} ports=${RUNPOD_PORTS} mount=${RUNPOD_VOLUME_MOUNT_PATH} network_volume_id=${RUNPOD_NETWORK_VOLUME_ID:-<none>} data_center_id=${RUNPOD_DATA_CENTER_ID:-<none>} template_id=${RUNPOD_TEMPLATE_ID:-<none>} image_name=${RUNPOD_IMAGE_NAME:-<none>}"
            PORTS_JSON=$(jq -cn --arg ports "$RUNPOD_PORTS" \
              '$ports | split(",") | map(gsub("^\\s+|\\s+$";"")) | map(select(length > 0))')
            if [ "$(echo "$PORTS_JSON" | jq -r 'length')" = "0" ]; then
              PORTS_JSON='["11434/http"]'
            fi

            build_rest_create_body() {
              local mode="$1"       # template|image
              local include_dc="$2" # with|without
              local template_id=""
              local image_name=""
              local data_center_id=""

              if [ "$mode" = "template" ]; then
                template_id="$RUNPOD_TEMPLATE_ID"
              else
                image_name="$RUNPOD_IMAGE_NAME"
              fi
              if [ "$include_dc" = "with" ]; then
                data_center_id="${RUNPOD_DATA_CENTER_ID:-}"
              fi

              jq -cn \
                --arg cloud "$RUNPOD_CLOUD_TYPE" \
                --arg name "$RUNPOD_POD_NAME" \
                --arg nv "${RUNPOD_NETWORK_VOLUME_ID:-}" \
                --arg gpu "$RUNPOD_GPU_TYPE_ID" \
                --argjson gc "$RUNPOD_GPU_COUNT" \
                --argjson disk "$RUNPOD_CONTAINER_DISK_GB" \
                --arg mount "$RUNPOD_VOLUME_MOUNT_PATH" \
                --arg templateId "$template_id" \
                --arg imageName "$image_name" \
                --arg dataCenterId "$data_center_id" \
                --argjson startCmd "$RUNPOD_DOCKER_START_CMD_JSON" \
                --argjson ports "$PORTS_JSON" \
                '(
                  {
                    cloudType:$cloud,
                    computeType:"GPU",
                    name:$name,
                    gpuCount:$gc,
                    gpuTypeIds:[$gpu],
                    containerDiskInGb:$disk,
                    ports:$ports
                  }
                  + (if $nv != "" then {networkVolumeId:$nv, volumeMountPath:$mount} else {} end)
                  + (if $templateId != "" then {templateId:$templateId} else {} end)
                  + (if $imageName != "" then {imageName:$imageName} else {} end)
                  + (if ($startCmd|length) > 0 then {dockerStartCmd:$startCmd} else {} end)
                  + (if $dataCenterId != "" then {dataCenterIds:[$dataCenterId]} else {} end)
                )'
            }

            CREATE_SUCCESS=0
            MODE_LIST=()
            if [ -n "$RUNPOD_TEMPLATE_ID" ]; then
              MODE_LIST+=("template")
            fi
            if [ -n "$RUNPOD_IMAGE_NAME" ]; then
              MODE_LIST+=("image")
            fi

            DC_LIST=("with")
            if [ -n "${RUNPOD_DATA_CENTER_ID:-}" ]; then
              DC_LIST=("with" "without")
            fi

            LAST_REST_HTTP=""
            LAST_REST_BODY=""
            for MODE in "${MODE_LIST[@]}"; do
              for DC_MODE in "${DC_LIST[@]}"; do
                for ATTEMPT in 1 2 3; do
                  echo "[INFO] create attempt via REST mode=${MODE} dc_mode=${DC_MODE} try=${ATTEMPT}"
                  REST_CREATE_BODY=$(build_rest_create_body "$MODE" "$DC_MODE")
                  REST_RAW=$(curl -sS -w '\n%{http_code}' -X POST https://rest.runpod.io/v1/pods \
                    -H "Content-Type: application/json" \
                    -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
                    -d "$REST_CREATE_BODY")

                  LAST_REST_HTTP=$(echo "$REST_RAW" | tail -n1)
                  LAST_REST_BODY=$(echo "$REST_RAW" | sed '$d')
                  echo "$LAST_REST_BODY"

                  REST_ID=$(echo "$LAST_REST_BODY" | jq -r '.id // empty')
                  REST_STATUS=$(echo "$LAST_REST_BODY" | jq -r '.desiredStatus // .status // empty')
                  if [[ "$LAST_REST_HTTP" =~ ^2[0-9][0-9]$ ]] && [ -n "$REST_ID" ]; then
                    REST_NETWORK_VOLUME_ID=$(echo "$LAST_REST_BODY" | jq -r '.networkVolume.id // .networkVolumeId // empty')
                    if [ -z "$REST_NETWORK_VOLUME_ID" ]; then
                      if VERIFY_RESP=$(query_pod_by_id "$REST_ID"); then
                        REST_NETWORK_VOLUME_ID=$(echo "$VERIFY_RESP" | jq -r '.data.pod.networkVolumeId // empty')
                      fi
                    fi

                    if [ -n "${RUNPOD_NETWORK_VOLUME_ID:-}" ] && [ "$REST_NETWORK_VOLUME_ID" != "$RUNPOD_NETWORK_VOLUME_ID" ]; then
                      echo "[WARN] created pod networkVolumeId mismatch: expected=${RUNPOD_NETWORK_VOLUME_ID} actual=${REST_NETWORK_VOLUME_ID:-<none>}. terminate and retry."
                      if ! terminate_pod "$REST_ID"; then
                        exit 1
                      fi
                      if [ "$ATTEMPT" -lt 3 ]; then
                        sleep $((ATTEMPT * 10))
                      fi
                      continue
                    fi
                    ACTION_SUMMARY="REST /v1/pods create succeeded: id=${REST_ID} status=${REST_STATUS:-<unknown>} mode=${MODE} dc_mode=${DC_MODE}"
                    ACTIVE_POD_ID="$REST_ID"
                    CREATE_SUCCESS=1
                    break 3
                  fi

                  REST_MSG=$(echo "$LAST_REST_BODY" | jq -r '.message // .error // empty')
                  echo "[WARN] rest create failed: http=${LAST_REST_HTTP:-<none>} msg=${REST_MSG:-<none>}"

                  if [ "$ATTEMPT" -lt 3 ]; then
                    sleep $((ATTEMPT * 10))
                  fi
                done
              done
            done

            if [ "$CREATE_SUCCESS" != "1" ]; then
              echo "[ERROR] pod creation failed via REST. last_rest_http=${LAST_REST_HTTP:-<none>} last_rest=$(echo "${LAST_REST_BODY:-{}}" | jq -c '.')"
              exit 1
            fi
          fi

          if [ -z "$ACTIVE_POD_ID" ] && [ -n "$TARGET_POD_ID" ]; then
            ACTIVE_POD_ID="$TARGET_POD_ID"
          fi

          if [ -z "$ACTION_SUMMARY" ]; then
            echo "[ERROR] no action was taken"
            exit 1
          fi

          if [ "${RUNPOD_PROXY_CHECK_ENABLED}" = "1" ] && [ -n "$ACTIVE_POD_ID" ]; then
            PROXY_PORT=$(parse_proxy_port "$RUNPOD_PORTS")
            if [[ "$PROXY_PORT" =~ ^[0-9]+$ ]]; then
              CHECK_RESULT=0
              check_proxy_warning "$ACTIVE_POD_ID" "$PROXY_PORT" || CHECK_RESULT=$?
              if [ "$CHECK_RESULT" = "2" ]; then
                echo "[ERROR] runpod critical machine warning detected. terminate this pod and re-run workflow."
                exit 1
              fi
            else
              echo "[WARN] proxy warning check skipped: invalid RUNPOD_PORTS=${RUNPOD_PORTS}"
            fi
          fi

          echo "$ACTION_SUMMARY"

          if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            PAYLOAD_JSON=$(jq -Rn --arg text "Morning start action: ${ACTION_SUMMARY}" '{text:$text}')
            curl -sS -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD_JSON" >/dev/null || true
          fi

          echo "morning-start workflow completed"
