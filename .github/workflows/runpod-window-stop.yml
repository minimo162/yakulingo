name: runpod-window-stop

on:
  schedule:
    - cron: "0 9 * * 1-5" # Mon-Fri 09:00 UTC = 18:00 JST
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stop-pod:
    runs-on: ubuntu-latest
    steps:
      - name: Stop or Terminate RunPod Pod
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_POD_ID: ${{ secrets.RUNPOD_POD_ID }}
          RUNPOD_POD_NAME: ${{ secrets.RUNPOD_POD_NAME }}
          RUNPOD_NETWORK_VOLUME_ID: ${{ secrets.RUNPOD_NETWORK_VOLUME_ID }}
          RUNPOD_FORCE_STOP: ${{ secrets.RUNPOD_FORCE_STOP }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          if [ -z "${RUNPOD_API_KEY:-}" ]; then
            echo "[ERROR] RUNPOD_API_KEY is not set"
            exit 1
          fi

          resolve_pod_by_name() {
            local pod_name="$1"
            local query_payload list_resp err_count matched_count
            query_payload='{"query":"query { myself { pods { id name desiredStatus } } }"}'
            list_resp=$(curl -sS https://api.runpod.io/graphql \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
              -d "$query_payload")
            err_count=$(echo "$list_resp" | jq -r '.errors | length // 0')
            if [ "$err_count" != "0" ]; then
              echo "[ERROR] pod list query failed: $(echo "$list_resp" | jq -c '.')"
              return 1
            fi
            matched_count=$(echo "$list_resp" | jq -r --arg name "$pod_name" '[.data.myself.pods[]? | select(.name == $name)] | length')
            if [ "$matched_count" = "0" ]; then
              return 0
            fi
            if [ "$matched_count" != "1" ]; then
              echo "[ERROR] multiple pods found by RUNPOD_POD_NAME=${pod_name}; set unique name"
              echo "$list_resp" | jq -r --arg name "$pod_name" '.data.myself.pods[]? | select(.name == $name) | "\(.id) \(.name) \(.desiredStatus // "")"'
              return 1
            fi
            echo "$list_resp" | jq -r --arg name "$pod_name" '.data.myself.pods[]? | select(.name == $name) | @json'
          }

          TARGET_POD_ID=""
          TARGET_STATUS=""
          TARGET_NETWORK_VOLUME_ID=""
          if [ -n "${RUNPOD_POD_NAME:-}" ]; then
            POD_JSON=$(resolve_pod_by_name "$RUNPOD_POD_NAME")
            if [ -z "$POD_JSON" ]; then
              echo "[INFO] no pod found by name (${RUNPOD_POD_NAME}); nothing to stop"
              exit 0
            fi
            TARGET_POD_ID=$(echo "$POD_JSON" | jq -r '.id')
            TARGET_STATUS=$(echo "$POD_JSON" | jq -r '.desiredStatus // empty')
          elif [ -n "${RUNPOD_POD_ID:-}" ]; then
            TARGET_POD_ID="${RUNPOD_POD_ID}"
          else
            echo "[ERROR] RUNPOD_POD_NAME or RUNPOD_POD_ID is not set"
            exit 1
          fi

          POD_QUERY_PAYLOAD=$(jq -cn --arg id "$TARGET_POD_ID" \
            '{"query":"query($id:String!){ pod(input:{podId:$id}) { id name desiredStatus networkVolumeId networkVolume { id } } }","variables":{"id":$id}}')
          POD_QUERY_RESP=$(curl -sS https://api.runpod.io/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -d "$POD_QUERY_PAYLOAD")
          POD_QUERY_ERR=$(echo "$POD_QUERY_RESP" | jq -r '.errors | length // 0')
          if [ "$POD_QUERY_ERR" != "0" ]; then
            echo "[ERROR] pod query failed: $(echo "$POD_QUERY_RESP" | jq -c '.')"
            exit 1
          fi

          POD_EXISTS=$(echo "$POD_QUERY_RESP" | jq -r '.data.pod.id // empty')
          if [ -z "$POD_EXISTS" ]; then
            echo "[INFO] target pod not found (${TARGET_POD_ID}); nothing to stop"
            exit 0
          fi

          TARGET_STATUS=$(echo "$POD_QUERY_RESP" | jq -r '.data.pod.desiredStatus // empty')
          TARGET_NETWORK_VOLUME_ID=$(echo "$POD_QUERY_RESP" | jq -r '.data.pod.networkVolumeId // .data.pod.networkVolume.id // empty')
          echo "target_pod_id=${TARGET_POD_ID} desiredStatus=${TARGET_STATUS} networkVolumeId=${TARGET_NETWORK_VOLUME_ID:-<none>} expectedNetworkVolumeId=${RUNPOD_NETWORK_VOLUME_ID:-<none>}"

          RUNPOD_FORCE_STOP=${RUNPOD_FORCE_STOP:-0}
          ACTION="stop"
          if [ "${RUNPOD_FORCE_STOP}" = "1" ]; then
            ACTION="stop"
            echo "[INFO] select action=stop (RUNPOD_FORCE_STOP=1)"
          elif [ -n "$TARGET_NETWORK_VOLUME_ID" ]; then
            ACTION="terminate"
            echo "[INFO] select action=terminate (pod has networkVolumeId)"
          elif [ -n "${RUNPOD_NETWORK_VOLUME_ID:-}" ]; then
            ACTION="terminate"
            echo "[INFO] select action=terminate (RUNPOD_NETWORK_VOLUME_ID is configured)"
          fi

          if [ "$ACTION" = "terminate" ]; then
            PAYLOAD=$(jq -cn --arg id "$TARGET_POD_ID" \
              '{"query":"mutation($input: PodTerminateInput!){ podTerminate(input:$input) }","variables":{"input":{"podId":$id}}}')
          else
            PAYLOAD=$(jq -cn --arg id "$TARGET_POD_ID" \
              '{"query":"mutation($input: PodStopInput!){ podStop(input:$input){ id desiredStatus } }","variables":{"input":{"podId":$id}}}')
          fi

          RESP=$(curl -sS https://api.runpod.io/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -d "$PAYLOAD")

          echo "$RESP"
          ERR_COUNT=$(echo "$RESP" | jq -r '.errors | length // 0')

          if [ "$ERR_COUNT" != "0" ]; then
            echo "[ERROR] pod${ACTION^} failed: $(echo "$RESP" | jq -c '.')"
            exit 1
          fi

          if [ "$ACTION" = "stop" ]; then
            STOP_ID=$(echo "$RESP" | jq -r '.data.podStop.id // empty')
            STOP_STATUS=$(echo "$RESP" | jq -r '.data.podStop.desiredStatus // empty')
            if [ -z "$STOP_ID" ]; then
              echo "[ERROR] podStop returned empty id: $(echo "$RESP" | jq -c '.')"
              exit 1
            fi
            RESULT_SUMMARY="podStop succeeded: id=${STOP_ID} status=${STOP_STATUS}"
          else
            RESULT_SUMMARY="podTerminate succeeded: id=${TARGET_POD_ID}"
          fi

          echo "$RESULT_SUMMARY"

          if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            MSG=$(echo "$RESP" | jq -c '.')
            PAYLOAD_JSON=$(jq -Rn --arg text "Window ${ACTION} executed: ${MSG}" '{text:$text}')
            curl -sS -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD_JSON" >/dev/null || true
          fi

          echo "window-${ACTION} workflow completed"
