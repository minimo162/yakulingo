<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LocaLingo</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="/vendor/htmx.min.js"></script>
  <script src="/app.js" defer></script>
</head>
<body>
  <main class="layout">
    <header class="hero">
      <h1>LocaLingo</h1>
    </header>

    <section class="panel controls">
      <div class="workspace-info">
        <label for="workspace-root">Workspace Root</label>
        <div id="workspace-root" class="workspace-root">Loading workspace...</div>
        <div class="actions">
          <button type="button" id="workspace-select-btn">Select Workspace...</button>
        </div>
      </div>

      <form id="chat-form">
        <div class="row">
          <label for="prompt">Prompt</label>
          <textarea id="prompt" name="prompt" rows="5" placeholder="Describe the task you want to run" required></textarea>
        </div>

        <div class="actions">
          <button type="submit">Run</button>
          <button
            type="button"
            hx-post="/api/session/reset"
            hx-target="#chat-log"
            hx-swap="innerHTML"
          >Clear</button>
          <span id="req-indicator" class="indicator">Idle</span>
        </div>
      </form>
    </section>

    <section class="panel">
      <div id="chat-log" class="chat-log"></div>
    </section>
  </main>
</body>
</html>
